"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"c59c0dcb-0cdd-4341-8989-abca4df70fb2\"><\u002Fscript>\n<\u002Fhead>\n<body>\n\n<x-dc>\n<helmet>\n<style>\n@font-face{font-family:\"SS Head\";src:url(\"32eaf1c4-6118-4126-9e7f-fedc9098022c\") format(\"truetype\");font-weight:300;font-display:swap;}\n@font-face{font-family:\"SS Head\";src:url(\"90f5627b-4839-4a55-ba0b-a63141555789\") format(\"truetype\");font-weight:400;font-display:swap;}\n@font-face{font-family:\"SS Head\";src:url(\"b7e5614f-13ba-46b3-be7a-9daaba32f492\") format(\"truetype\");font-weight:500;font-display:swap;}\n@font-face{font-family:\"SS Head\";src:url(\"de16a0d0-7603-4d3e-8a41-50fa7da9d981\") format(\"truetype\");font-weight:700;font-display:swap;}\n@font-face{font-family:\"SS Body\";src:url(\"5ff8543b-a150-47da-a370-e9a2b285f2b6\") format(\"truetype\");font-weight:400;font-display:swap;}\n@font-face{font-family:\"SS Body\";src:url(\"b4c22d36-a6f0-4f52-9eec-7e2e74671994\") format(\"truetype\");font-weight:700;font-display:swap;}\n*{box-sizing:border-box;}\nhtml,body{margin:0;padding:0;background:#E9EBEF;}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div ref=\"{{ rootRef }}\" data-screen-label=\"SpinQuant Qwen3-VL\" style=\"--r2-color:#00A3E0;--online-display:inline-flex;width:1840px;background:#FFFFFF;font-family:'SS Body','Helvetica Neue',Arial,sans-serif;color:#121417;padding:64px 72px 56px;display:flex;flex-direction:column;gap:34px;\">\n\n  <!-- ============ HEADER ============ -->\n  <div style=\"display:flex;justify-content:space-between;align-items:flex-start;gap:40px;\">\n    <div style=\"display:flex;flex-direction:column;gap:14px;max-width:1180px;\">\n      <div style=\"display:flex;align-items:center;gap:12px;\">\n        <div style=\"width:34px;height:4px;background:#1428A0;border-radius:2px;\"><\u002Fdiv>\n        <span style=\"font-family:'SS Body';font-size:13px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#515861;\">Post-training quantization · SpinQuant<\u002Fspan>\n      <\u002Fdiv>\n      <h1 style=\"margin:0;font-family:'SS Head';font-weight:700;font-size:48px;line-height:1.04;letter-spacing:-0.02em;color:#121417;\">Fuse-only SpinQuant for Qwen3-VL<\u002Fh1>\n      <p style=\"margin:0;font-family:'SS Body';font-size:19px;line-height:1.5;color:#515861;max-width:1080px;\">Only the mergeable rotations <b style=\"color:#1428A0;\">R<sub style=\"font-size:.7em;\">1<\u002Fsub><\u002Fb> and <b style=\"color:#0a7ea8;\">R<sub style=\"font-size:.7em;\">2<\u002Fsub><\u002Fb> are folded offline into linear weights. Online rotations are dropped for zero inference overhead, and tied embeddings stay intact.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;align-items:flex-end;gap:10px;flex:0 0 auto;\">\n      <img src=\"7f5f4af1-d0ca-48ee-9338-3062544ff9f5\" alt=\"Samsung\" style=\"height:24px;width:auto;display:block;\">\n      <span style=\"font-family:'SS Body';font-size:12px;color:#939AA4;letter-spacing:0.02em;\">TICO · quantization / spinquant<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ DESIGN-DECISION BAND ============ -->\n  <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;\">\n    <div style=\"background:#E7EAF7;border-radius:14px;padding:18px 22px;display:flex;flex-direction:column;gap:6px;\">\n      <span style=\"font-family:'SS Head';font-weight:700;font-size:16px;color:#1428A0;\">Offline fusion only<\u002Fspan>\n      <span style=\"font-size:14px;line-height:1.5;color:#34383F;\">R<sub style=\"font-size:.7em;\">1<\u002Fsub> and R<sub style=\"font-size:.7em;\">2<\u002Fsub> are absorbed into adjacent linears at convert time — no extra matmul runs at inference.<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"background:#F6F7F9;border:1px solid #DCDFE4;border-radius:14px;padding:18px 22px;display:flex;flex-direction:column;gap:6px;\">\n      <span style=\"font-family:'SS Head';font-weight:700;font-size:16px;color:#34383F;\">No online rotation<\u002Fspan>\n      <span style=\"font-size:14px;line-height:1.5;color:#515861;\">The paper's online R<sub style=\"font-size:.7em;\">3<\u002Fsub>/R<sub style=\"font-size:.7em;\">4<\u002Fsub> Hadamard rotations are excluded to keep runtime overhead at zero.<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"background:#F6F7F9;border:1px solid #DCDFE4;border-radius:14px;padding:18px 22px;display:flex;flex-direction:column;gap:6px;\">\n      <span style=\"font-family:'SS Head';font-weight:700;font-size:16px;color:#34383F;\">Tied embeddings preserved<\u002Fspan>\n      <span style=\"font-size:14px;line-height:1.5;color:#515861;\">Embedding and LM head share weights, so their R<sub style=\"font-size:.7em;\">1<\u002Fsub> is applied by runtime boundary layers, not fused.<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ (a) END-TO-END PIPELINE ============ -->\n  <div style=\"background:#F6F7F9;border:1px solid #E3E6EB;border-radius:18px;padding:26px 28px 30px;display:flex;flex-direction:column;gap:22px;\">\n    <div style=\"display:flex;align-items:baseline;gap:12px;\">\n      <span style=\"font-family:'SS Head';font-weight:700;font-size:13px;color:#1428A0;letter-spacing:0.06em;\">(a)<\u002Fspan>\n      <span style=\"font-family:'SS Head';font-weight:500;font-size:20px;color:#121417;\">Multimodal pipeline — where rotations live<\u002Fspan>\n    <\u002Fdiv>\n\n    <!-- stage 1: token fusion -->\n    <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:2px;\">\n      <span style=\"background:#1428A0;color:#fff;font-family:'SS Head';font-weight:700;font-size:11px;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex:0 0 auto;\">1<\u002Fspan>\n      <span style=\"font-family:'SS Head';font-weight:500;font-size:14px;color:#34383F;\">Token fusion — visual tokens are merged into the text sequence<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:58px max-content 116px;align-items:center;row-gap:16px;\">\n      <!-- vision row -->\n      <span style=\"grid-column:1;grid-row:1;font-family:'SS Body';font-weight:700;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#939AA4;\">Vision<\u002Fspan>\n      <div style=\"grid-column:2;grid-row:1;min-height:92px;display:flex;align-items:center;gap:0;\">\n        <div style=\"display:flex;flex-direction:column;gap:3px;background:#fff;border:1px solid #DCDFE4;border-radius:12px;padding:11px 15px;box-shadow:0 1px 3px rgba(18,20,23,.06);flex:0 0 auto;white-space:nowrap;\">\n          <span style=\"font-family:'SS Head';font-weight:500;font-size:14.5px;\">Image / video<\u002Fspan>\n          <span style=\"font-size:11px;color:#6E7681;\">pixel patches<\u002Fspan>\n        <\u002Fdiv>\n        <svg width=\"30\" height=\"12\" viewBox=\"0 0 30 12\" style=\"flex:0 0 auto;align-self:center;margin:0 2px;display:block;overflow:visible;\"><line x1=\"0\" y1=\"6\" x2=\"24\" y2=\"6\" stroke=\"#C4C9D0\" stroke-width=\"2\"><\u002Fline><path d=\"M22 1.5 L29 6 L22 10.5 Z\" fill=\"#C4C9D0\"><\u002Fpath><\u002Fsvg>\n        <div style=\"display:flex;flex-direction:column;gap:5px;background:#fff;border:1px solid #DCDFE4;border-radius:12px;padding:11px 15px;box-shadow:0 1px 3px rgba(18,20,23,.06);flex:0 0 auto;white-space:nowrap;\">\n          <span style=\"font-family:'SS Head';font-weight:500;font-size:14.5px;\">Patch embed<\u002Fspan>\n          <span style=\"font-size:11px;color:#6E7681;\">Conv3d + position<\u002Fspan>\n          <span style=\"align-self:flex-start;background:#E7EAF7;color:#1428A0;font-size:10px;font-weight:700;padding:3px 7px;border-radius:5px;\">R1 fused<\u002Fspan>\n        <\u002Fdiv>\n        <svg width=\"30\" height=\"12\" viewBox=\"0 0 30 12\" style=\"flex:0 0 auto;align-self:center;margin:0 2px;display:block;overflow:visible;\"><line x1=\"0\" y1=\"6\" x2=\"24\" y2=\"6\" stroke=\"#C4C9D0\" stroke-width
