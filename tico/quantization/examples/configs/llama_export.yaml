model:
  family: llama
  name_or_path: Maykeye/TinyLLama-v0
  trust_remote_code: false
  hf_token: null
  cache_dir: null

runtime:
  device: cpu
  dtype: float32
  seed: 42
  show_progress: true

model_args:
  profile: npu_export

calibration:
  dataset: Salesforce/wikitext
  dataset_config: wikitext-2-raw-v1
  split: train
  n_samples: 1
  seq_len: 2048
  decode_steps: 8

pipeline: []

evaluation:
  enabled: false
  perplexity: null
  lm_eval_tasks: null
  max_seq_len: 2048

export:
  enabled: true
  output_dir: ./out/llama_quantized/circle_layers
  max_seq_len: 2048
  prefill_decode: true
  artifacts:
    - circle_per_layer
