# Export a Qwen3-VL model or saved checkpoint without running quantization stages.
model:
  family: qwen3_vl
  name_or_path: Qwen/Qwen3-VL-4B-Instruct
  trust_remote_code: true
  hf_token: null
  cache_dir: null

runtime:
  device: cpu
  dtype: float32
  seed: 42
  show_progress: true

calibration:
  seq_len: 2048

model_args:
  vision:
    grid_thw: [8, 24, 24]
    visual_start_idx: 0
    spatial_merge_size: 2

pipeline: []

evaluation:
  enabled: false
  max_seq_len: 2048

export:
  enabled: true
  output_dir: ./out/qwen3_vl_export
  artifacts:
    - ptq_checkpoint
