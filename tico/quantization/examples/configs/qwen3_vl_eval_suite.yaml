model:
  family: qwen3_vl
  name_or_path: Qwen/Qwen3-VL-4B-Instruct
  trust_remote_code: true
  hf_token: null
  cache_dir: null

runtime:
  device: cuda
  dtype: float32
  seed: 42
  show_progress: true

calibration:
  datasets:
    - dataset: vqav2
      split: testdev
      n_samples: 128
    - dataset: wikitext2
      split: train
      n_samples: 128
  seq_len: 2048

model_args:
  vision:
    grid_thw: [8, 24, 24]
    visual_start_idx: 0
    spatial_merge_size: 2

pipeline:
  - name: spinquant
    enabled: true
    enable_vision_r1: true
    enable_vision_r2: true

  - name: smoothquant
    enabled: false

  - name: gptq
    enabled: true
    weight_bits: 4

  - name: ptq
    enabled: true
    activation: int16
    linear_weight: uint4
    vision_patch_embed_weight: uint8
    embedding_weight: uint8
    lm_head_weight: uint8
    spin_rotation_weight: int16
    norm: int16
    norm_weight: int16
    strict_wrap: true

evaluation:
  enabled: true
  vlm_tasks:
    - vqav2
  coco: true
  llava_bench:
    enabled: true
    mode: judge
    dataset: lmms-lab/llava-bench-in-the-wild
    split: train
    n_samples: 50
    start_index: 0
    max_seq_len: 2048
    max_new_tokens: 512
    temperature: 0.0
    image_max_pixels: 602112  # 768 * 28 * 28
    image_min_pixels: null
    resized_height: null
    resized_width: null
    visual_token_margin: 256
    candidate_label: Qwen3-VL-4B-Instruct
    baseline_label: reference
    candidate_answers: null
    baseline_answers: null
    regenerate: false
    output:
      dir: ./out/qwen3_vl_eval_suite/llava_bench
      answers: ./out/qwen3_vl_eval_suite/llava_bench/qwen3_vl_4b.answers.jsonl
      reviews: ./out/qwen3_vl_eval_suite/llava_bench/qwen3_vl_4b.llama3_2_3b.reviews.jsonl
      summary: ./out/qwen3_vl_eval_suite/llava_bench/qwen3_vl_4b.llama3_2_3b.summary.json
    judge:
      enabled: true
      model_id: meta-llama/Llama-3.2-3B-Instruct
      device: cuda
      dtype: float16
      max_new_tokens: 256
      temperature: 0.0
      swap_order: true
  videomme:
    enabled: true
    batch_size: 1
    max_new_tokens: 30
    n_samples: 1000
    max_num_frames: 32
    use_cache: null
    verbose: true
  mmlu:
    enabled: true
    subjects: null
    n_shots: 5
    n_samples: -1
    batch_size: 1
  hellaswag:
    enabled: true
    n_shots: 10
    n_samples: 1000
    batch_size: 1
  mmmu:
    enabled: true
    dataset: MMMU/MMMU_Pro
    subjects:
      - vision
    n_shots: 5
    n_samples: 1000
    max_new_tokens: 16
    temperature: 0.0
    verbose: false
  ppl:
    enabled: true
    dataset: wikitext2
    split: test
    stride: 512
  n_samples: 1000
  max_seq_len: 2048

export:
  enabled: false
  output_dir: ./out/qwen3_vl_eval_suite
  artifacts:
    - ptq_checkpoint
